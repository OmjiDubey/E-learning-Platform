<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Scholarly</title>
  <meta name="description"
    content="View your Scholarly profile, saved favorites, quiz results, and watch-later list." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/profile.css" />
</head>

<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar">
    <a href="dashboard.html" class="navbar-brand">
      <span class="brand-name">Scholarly</span>
    </a>

    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
    </div>

    <div class="navbar-actions">
      <a href="#" class="btn-ghost" id="logout-btn">Logout</a>
      <a href="profile.html" class="btn-primary" id="nav-profile-btn" style="gap:8px; padding:8px 16px;">
        My Profile
        <div class="avatar" id="nav-avatar"
          style="width:28px;height:28px;font-size:0.8rem;background:rgba(255,255,255,0.25);"></div>
      </a>
    </div>
  </nav>

  <!-- ── PAGE BODY ── -->
  <div class="page-wrapper profile-page-wrapper">

    <!-- ── LEFT COLUMN ── -->
    <div class="profile-left">

      <!-- Profile Hero Card -->
      <div class="profile-hero card">
        <div class="profile-hero-inner">
          <!-- Avatar -->
          <div class="profile-avatar-wrap">
            <div class="avatar lg profile-avatar" id="profile-avatar"></div>
          </div>

          <!-- User Info -->
          <div class="profile-hero-info">
            <h1 class="profile-name" id="profile-name">Loading...</h1>
            <p class="profile-email" id="profile-email">Loading...</p>
          </div>
        </div>

      </div>

      <!-- ── MY FAVORITES ── -->
      <section class="profile-section" aria-labelledby="fav-heading">
        <div class="section-row-header">
          <div>
            <h2 class="section-heading" id="fav-heading" style="margin-bottom:2px;">My Favorites</h2>
            <p class="section-sub">Courses you've bookmarked for easy access.</p>
          </div>
        </div>
        <div class="scroll-row" id="favorites-container">
          <!-- Injected by JS -->
        </div>
      </section>

      <!-- ── WATCH LATER ── -->
      <section class="profile-section" aria-labelledby="wl-heading">
        <h2 class="section-heading" id="wl-heading" style="margin-bottom:2px;">Watch Later</h2>
        <p class="section-sub" style="margin-bottom:16px;">Saved modules and standalone lectures.</p>
        <ul class="watch-later-list" id="watch-later-container">
          <!-- Injected by JS -->
        </ul>
      </section>

    </div>

    <!-- ── RIGHT COLUMN: Quiz Results ── -->
    <aside class="profile-right" aria-label="Quiz Results">
      <div class="quiz-results-card card">
        <h2 class="section-heading" style="margin-bottom:18px;">Quiz Results</h2>
        <ul class="quiz-results-list" id="quiz-results-container">
          <!-- Injected by JS -->
        </ul>
      </div>
    </aside>

  </div>



  <script type="module" src="js/profile.js"></script>
</body>

</html>
