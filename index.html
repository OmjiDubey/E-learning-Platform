<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scholarly — The Digital Curator</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">

  <div class="auth-brand">
    <h1>Scholarly</h1>
    <p>The Digital Curator</p>
  </div>

  <div class="auth-card">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div class="auth-form active" id="form-login">
      <div id="login-msg" class="msg"></div>

      <div class="form-group">
        <label class="field-label">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          </span>
          <input type="email" id="login-email" placeholder="student@university.edu" autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label class="field-label">Password</label>
          <a href="#" class="link-sm">Forgot?</a>
        </div>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
          <button type="button" class="toggle-pw" onclick="togglePw('login-password', this)" aria-label="Toggle password">
            <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-primary full-width lg" onclick="handleLogin()">
        Login to Scholarly
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>

      <div class="divider">or continue with</div>

      <div class="social-btns">
        <button class="btn-social">
          <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="btn-social">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.14 3 .4 2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </button>
      </div>
    </div>

    <!-- Sign Up Form -->
    <div class="auth-form" id="form-signup">
      <div id="signup-msg" class="msg"></div>

      <div class="form-group">
        <label class="field-label">Full Name</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </span>
          <input type="text" id="signup-name" placeholder="Your full name" autocomplete="name"/>
        </div>
      </div>

      <div class="form-group">
        <label class="field-label">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          </span>
          <input type="email" id="signup-email" placeholder="student@university.edu" autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <label class="field-label">Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="signup-password" placeholder="Create a password" autocomplete="new-password"/>
          <button type="button" class="toggle-pw" onclick="togglePw('signup-password', this)" aria-label="Toggle password">
            <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-primary full-width lg" onclick="handleSignup()">
        Create Account
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>

      <div class="divider">or continue with</div>

      <div class="social-btns">
        <button class="btn-social">
          <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="btn-social">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.14 3 .4 2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </button>
      </div>
    </div>
  </div>

  <p class="footer-note">
    By continuing, you agree to Scholarly's
    <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
  </p>

  <script src="js/auth.js"></script>
  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase/config.js";

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // If user is already logged in, go to dashboard
    auth.onAuthStateChanged(function(user) {
      if (user) {
        window.location.href = "dashboard.html";
      }
    });

    // Login
    window.handleLogin = async function(event) {
      event.preventDefault();

      const email    = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;
      const errorEl  = document.getElementById("login-error");

      errorEl.textContent = "";

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "dashboard.html";
      } catch (error) {
        errorEl.textContent = getErrorMessage(error.code);
      }
    };

    // Signup
    window.handleSignup = async function(event) {
      event.preventDefault();

      const name     = document.getElementById("signup-name").value;
      const email    = document.getElementById("signup-email").value;
      const password = document.getElementById("signup-password").value;
      const errorEl  = document.getElementById("signup-error");

      errorEl.textContent = "";

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Save display name to Firebase Auth profile
        await updateProfile(user, { displayName: name });

        // Save user data to Firestore
        await setDoc(doc(db, "users", user.uid), {
          name       : name,
          email      : email,
          createdAt  : serverTimestamp(),
          favorites  : [],
          watchLater : []
        });

        window.location.href = "dashboard.html";
      } catch (error) {
        errorEl.textContent = getErrorMessage(error.code);
      }
    };

    // Convert Firebase error codes to readable messages
    function getErrorMessage(code) {
      if (code === "auth/user-not-found")       return "No account found with this email.";
      if (code === "auth/wrong-password")        return "Incorrect password.";
      if (code === "auth/invalid-email")         return "Please enter a valid email.";
      if (code === "auth/email-already-in-use")  return "This email is already registered.";
      if (code === "auth/weak-password")         return "Password must be at least 6 characters.";
      if (code === "auth/invalid-credential")    return "Invalid email or password.";
      if (code === "auth/too-many-requests")     return "Too many attempts. Try again later.";
      return "Something went wrong. Please try again.";
    }
  </script>

  <script>
    // Show Login form, hide Signup form
    function showLogin() {
      document.getElementById("login-form").classList.remove("hidden");
      document.getElementById("signup-form").classList.add("hidden");
      document.getElementById("tab-login").classList.add("active");
      document.getElementById("tab-signup").classList.remove("active");
    }

    // Show Signup form, hide Login form
    function showSignup() {
      document.getElementById("signup-form").classList.remove("hidden");
      document.getElementById("login-form").classList.add("hidden");
      document.getElementById("tab-signup").classList.add("active");
      document.getElementById("tab-login").classList.remove("active");
    }

    // Toggle password visibility
    function togglePassword(inputId, toggleEl) {
      const input = document.getElementById(inputId);
      if (input.type === "password") {
        input.type = "text";
        toggleEl.textContent = "Hide";
      } else {
        input.type = "password";
        toggleEl.textContent = "Show";
      }
    }
  </script>
</body>
</html>
